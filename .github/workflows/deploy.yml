name: Deploy studio to Pages

# Publishes the single-file studio (./index.html) to GitHub Pages and wires in every
# connection at build time, so the live site arrives already connected and nobody has
# to paste a URL or a key into the app. See SETUP.md.
#
# REQUIRED once: Settings -> Pages -> Source: "GitHub Actions" (NOT "Deploy from a branch").
# With "Deploy from a branch", GitHub's own pages-build-deployment owns the site and this
# workflow just queues forever, then fails.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-progress Pages deployment (that can wedge it).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Never ship maths that doesn't pass. The suite reads index.html itself.
      - name: Core tests
        run: node test/core.test.mjs

      - uses: actions/configure-pages@v5

      - name: Stage the studio
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      # Secrets (Settings -> Secrets and variables -> Actions):
      #   SUPABASE_URL, SUPABASE_ANON_KEY   -> cloud saves
      # Variables (same page, "Variables" tab — these aren't secret):
      #   BACKEND_URL   e.g. https://lee3d-backend.onrender.com   (optional)
      #   LIB_REPO      e.g. BEARME-A/LEE3D-Lib                   (optional)
      # Anything you leave unset simply stays switched off in the app.
      - name: Wire connections into the page
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BE_URL: ${{ vars.BACKEND_URL }}
          LIB_REPO: ${{ vars.LIB_REPO }}
        run: |
          python3 -c "import os; p='_site/index.html'; s=open(p).read(); m={'__SUPABASE_URL__':'SB_URL','__SUPABASE_ANON_KEY__':'SB_KEY','__BACKEND_URL__':'BE_URL','__LIB_REPO__':'LIB_REPO'}; [s:=s.replace(k, os.environ.get(v,'') or k) for k,v in m.items()]; open(p,'w').write(s); print('wired:', ', '.join(k for k,v in m.items() if os.environ.get(v)) or 'nothing (all left as placeholders)')"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4

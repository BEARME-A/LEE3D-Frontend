name: Deploy studio to Pages

# The product is the single-file zero-build studio at ./index.html — this publishes it
# to GitHub Pages (no Node, no build) and injects the Supabase config from repo secrets.
#
# REQUIRED one-time setting (this is what "deployment queued forever / fails" means):
#   Settings -> Pages -> Source: "GitHub Actions"   (NOT "Deploy from a branch").
# With "Deploy from a branch", GitHub runs its own "pages-build-deployment" and this
# Actions deploy can never take over the Pages site, so it just queues then fails.
# Switching the source to "GitHub Actions" makes THIS workflow the deployer and stops
# the automatic pages-build-deployment.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-progress Pages deployment (that can wedge it).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Stage the single-file studio
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Hard-wire Supabase config from repo secrets
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 -c "import os; p='_site/index.html'; s=open(p).read(); s=s.replace('__SUPABASE_URL__', os.environ.get('SB_URL','')).replace('__SUPABASE_ANON_KEY__', os.environ.get('SB_KEY','')); open(p,'w').write(s); print('Supabase config injected:', 'yes' if os.environ.get('SB_URL') else 'empty - app falls back to manual entry')"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4

name: Deploy studio to Pages

# The product is the single-file zero-build studio at ./index.html.
# This deploys it straight to GitHub Pages — no Node, no Next build, nothing to break.
#
# One-time setup on GitHub:  Settings -> Pages -> Source: "GitHub Actions".
# Then DELETE the auto-generated .github/workflows/nextjs.yml (it expects a
# package.json at the repo root and will always fail).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Stage the single-file studio
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Hard-wire Supabase config from repo secrets
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 - "$SB_URL" "$SB_KEY" <<'PY'
          import sys
          url,key=sys.argv[1],sys.argv[2]
          p="_site/index.html"; s=open(p).read()
          s=s.replace("__SUPABASE_URL__",url).replace("__SUPABASE_ANON_KEY__",key)
          open(p,"w").write(s)
          print("Supabase config injected:", "yes" if url else "empty (falls back to local entry)")
          PY

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
